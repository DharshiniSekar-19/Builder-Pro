{% extends 'base.html' %}
{% block title %}Delete Activity{% endblock %}
{% block breadcrumb %}Delete Activity{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h6 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Confirm Deletion</h6>
            </div>
            <div class="card-body text-center py-5">
                <i class="fas fa-trash-alt fa-4x text-danger mb-3"></i>
                <h5>Delete "{{ activity.name }}"?</h5>
                <p class="text-muted">Project: {{ activity.project.name }}</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Delete</button>
                    <a href="{% url 'activity_detail' activity.pk %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
